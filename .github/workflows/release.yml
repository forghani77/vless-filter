name: Beta Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build Binaries
      run: |
        mkdir -p dist
        GOOS=linux GOARCH=amd64 go build -v -o dist/vf-linux-amd64 main.go
        GOOS=windows GOARCH=amd64 go build -v -o dist/vf-windows-amd64.exe main.go
        GOOS=darwin GOARCH=amd64 go build -v -o dist/vf-darwin-amd64 main.go
        GOOS=darwin GOARCH=arm64 go build -v -o dist/vf-darwin-arm64 main.go

    - name: Create Beta Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: beta
        name: Beta Release
        body: "Automated beta release of vf (VLESS Filter)."
        draft: false
        prerelease: true
        files: dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
